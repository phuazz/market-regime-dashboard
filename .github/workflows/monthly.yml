# Refreshes the monthly cadence group (Sahm rule, PMI proxy, LEI headline,
# Shiller CAPE). Monthly prints land on scattered days, so this polls weekly;
# the scrape-history files append at most one point per reference month.
name: Monthly-group data refresh

on:
  schedule:
    # 12:00 UTC every Monday (20:00 Singapore).
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run offline tests
        run: python -m unittest discover -s tests

      - name: Update monthly-group data
        id: update
        run: |
          set +e
          python scripts/update_data.py --group monthly
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Build docs
        run: python scripts/build.py

      - name: Commit and push refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Automated monthly-group data refresh"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Surface builder failures
        if: steps.update.outputs.exit_code != '0'
        run: |
          echo "One or more builders failed; previous values were retained for those rows."
          exit 1
