# Temporary network diagnostics for runner egress to the data endpoints.
# Dispatch manually; delete this workflow once the endpoint behaviour from
# GitHub-hosted runners is understood and documented.
name: Network diagnostics

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: curl probes
        run: |
          echo "=== curl fredgraph, default curl agent ==="
          curl -s -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" --max-time 30 "https://fred.stlouisfed.org/graph/fredgraph.csv?id=SP500" || echo "curl reported failure"
          echo "=== curl fredgraph, pipeline bot agent ==="
          curl -s -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" --max-time 30 -A "navigo-market-regime-dashboard/1.0 (internal data pipeline)" "https://fred.stlouisfed.org/graph/fredgraph.csv?id=SP500" || echo "curl reported failure"
          echo "=== curl yahoo chart, browser agent ==="
          curl -s -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" --max-time 30 -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36" "https://query1.finance.yahoo.com/v8/finance/chart/%5EGSPC?range=5d&interval=1d" || echo "curl reported failure"
          echo "=== IPv6 route check ==="
          curl -6 -s -o /dev/null -w "HTTP %{http_code} via IPv6\n" --max-time 10 "https://fred.stlouisfed.org/graph/fredgraph.csv?id=SP500" || echo "no IPv6 route (expected on hosted runners)"

      - name: Python urllib probes
        run: python3 scripts/net_probe.py
